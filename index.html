<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гайд ЦЛП: Как помочь коллеге</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');

    /* CLP brand palette */
    :root {
      --blue100: #019BAB;
      --blue80: #5BBEC9;
      --blue20: #C7E9ED;
      --pink100: #E5004F;
      --pink60: #EA496D;
      --yellow100: #F8A600;
      --yellow80: #FCBA00;
      --green100: #04A634;
      --green80: #89BD1E;
      --white: #FFFFFF;
      --nearblack: #2A2A2A;
      --soft-shadow: 0 10px 25px rgba(1, 155, 171, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #eaeff2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }

    /* Page Container (Strict A4 Proportions) */
    .pdf-page {
      width: 210mm;
      height: 297mm;
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      color: var(--nearblack);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 2px;
      page-break-after: always;
    }

    /* Decorative Background Pattern */
    .pdf-page::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(var(--blue20) 0.8px, transparent 0.8px);
      background-size: 35px 35px;
      opacity: 0.15;
      pointer-events: none;
    }

    /* COVER SECTION */
    .cover {
      background: var(--blue100);
      padding: 0;
      position: relative;
      color: var(--white);
      z-index: 1;
      display: flex;
      flex-direction: column;
    }

    .cover-text {
      padding: 2rem 3.5rem 1.5rem;
    }

    .cover-deco {
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
    }

    .cover-logo {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      color: var(--blue20);
    }

    .cover-tag {
      display: inline-block;
      background: var(--yellow100);
      color: var(--nearblack);
      font-size: 12px;
      font-weight: 800;
      padding: 5px 18px;
      border-radius: 40px;
      margin-bottom: 0.8rem;
    }

    .cover h1 {
      font-family: 'PT Serif', serif;
      font-size: 32px;
      line-height: 1.1;
      max-width: 650px;
    }

    /* Full width image */
    .main-hero-img {
      width: 100%;
      height: 300px; /* Увеличено для заполнения пространства */
      object-fit: cover;
      display: block;
      margin: 0;
    }

    .stripe-y { height: 10px; background: var(--yellow100); position: relative; z-index: 2; }
    .stripe-g { height: 5px; background: var(--green80); position: relative; z-index: 2; }

    /* TEXT CONTENT */
    .intro {
      padding: 1.5rem 3.5rem;
      background: var(--blue20);
      position: relative;
    }
    .intro p {
      font-family: 'PT Serif', serif;
      font-size: 17.5px;
      line-height: 1.4;
      font-style: italic;
      color: #1a4a4e;
    }

    .section {
      padding: 1.2rem 3.5rem;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 2.5rem;
      align-items: start;
      position: relative;
      z-index: 1;
    }
    .section.reverse {
      grid-template-columns: 220px 1fr;
    }

    .sec-content h2 {
      font-family: 'PT Serif', serif;
      font-size: 22px;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--blue100);
      line-height: 1.15;
    }
    .num {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800;
      flex-shrink: 0;
      transform: rotate(-3deg);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .sec-text {
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }
    .sec-text p { margin-bottom: 0.5rem; }

    .tip {
      margin-top: 0.8rem;
      padding: 0.8rem 1rem;
      border-radius: 15px;
      font-weight: 700;
      font-size: 14.5px;
      border-left: 8px solid var(--blue100);
      background: var(--white);
      box-shadow: var(--soft-shadow);
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: #1e4d50;
    }
    .tip::before { content: "✨"; font-size: 18px; }

    .illus-container img {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    /* FOOTER AREA */
    .footer {
      background: var(--blue100);
      padding: 1.8rem 3rem;
      color: white;
      text-align: center;
      margin-top: auto;
    }
    .footer h3 { font-family: 'PT Serif', serif; font-size: 24px; margin-bottom: 0.4rem; }
    .footer p { color: var(--blue20); margin-bottom: 1.2rem; font-size: 15px; max-width: 580px; margin-left: auto; margin-right: auto; line-height: 1.35; }
    .footer-btn {
      display: inline-block;
      background: var(--yellow100);
      color: var(--nearblack);
      padding: 10px 35px;
      border-radius: 80px;
      font-weight: 800;
      text-decoration: none;
      font-size: 15px;
      box-shadow: 0 8px 15px rgba(248, 166, 0, 0.3);
    }

    .page-footer {
      padding: 0.8rem 3.5rem;
      display: flex; justify-content: space-between;
      font-size: 11px; color: #94a3b8;
      border-top: 1px solid #f1f5f9;
      position: relative;
      margin-top: auto; /* Гарантирует прижатие к низу */
      flex-shrink: 0;
    }

    /* Checklist Section */
    .checklist {
      background: #fafbfc;
      border: 3px dashed var(--blue80);
      margin: 0 3.5rem 1rem;
      padding: 1.2rem;
      border-radius: 20px;
    }

      font
